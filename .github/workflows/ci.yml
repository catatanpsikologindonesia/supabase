name: Repository Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Bash Syntax
        run: |
          for file in scripts/*.sh; do
            bash -n "$file"
          done

      - name: Validate Repository Structure
        run: ./scripts/ci_validate_repo.sh
